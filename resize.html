<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title data-i18n="customResizeTitle">Adjust Image</title>
  <link rel="stylesheet" href="lib/cropper.min.css">
  <link rel="stylesheet" href="resize.css">
</head>
<body>
  <div class="app" id="app">
    <!-- Top bar -->
    <div class="topbar">
      <div class="topbar-left">
        <img src="icons/icon32.png" alt="" class="topbar-logo">
        <h1 data-i18n="customResizeTitle">Adjust Image</h1>
      </div>
      <div id="info-text" class="topbar-info"></div>
    </div>

    <!-- Main area -->
    <div class="main">
      <!-- Image area with Cropper -->
      <div class="crop-area" id="crop-area">
        <img id="cropper-img" src="" alt="">
      </div>

      <!-- Controls sidebar -->
      <div class="sidebar">
        <!-- Background preview (for transparent images) -->
        <div class="ctrl-group" id="bg-group" style="display:none">
          <label class="ctrl-label" data-i18n="bgPreview">Background Preview</label>
          <div class="bg-btns">
            <button class="bg-btn bg-white" data-bg="#ffffff" data-i18n-title="bgWhite" title="White"></button>
            <button class="bg-btn bg-gray" data-bg="#808080" data-i18n-title="bgGray" title="Gray"></button>
            <button class="bg-btn bg-black" data-bg="#000000" data-i18n-title="bgBlack" title="Black"></button>
            <button class="bg-btn bg-checker active" data-bg="checker" data-i18n-title="bgTransparent" title="Transparent"></button>
          </div>
        </div>

        <!-- Transform: Rotate & Flip -->
        <div class="ctrl-group">
          <label class="ctrl-label" data-i18n="pTransform">Transform</label>
          <div class="preset-grid preset-grid-icons">
            <button class="preset-icon-btn" id="btn-rotate-left" data-i18n-title="pRotateLeft" title="Rotate left"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 2v6h6"/><path d="M2.5 8a10 10 0 1 1 1.3 5"/></svg><span data-i18n="pRotate">Rotate</span></button>
            <button class="preset-icon-btn" id="btn-flip-h" data-i18n-title="pFlipH" title="Flip horizontal"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"/><path d="M16 6l4 6-4 6"/><path d="M8 6L4 12l4 6" stroke-dasharray="2 2"/></svg><span data-i18n="pHorizontal">Horizontal</span></button>
            <button class="preset-icon-btn" id="btn-flip-v" data-i18n-title="pFlipV" title="Flip vertical"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h20"/><path d="M6 8L12 4l6 4"/><path d="M6 16l6 4 6-4" stroke-dasharray="2 2"/></svg><span data-i18n="pVertical">Vertical</span></button>
          </div>
        </div>

        <!-- Crop dimensions -->
        <div class="ctrl-group">
          <label class="ctrl-label" data-i18n="cropArea">Crop Area</label>
          <div class="dim-row">
            <div class="dim-field">
              <span class="dim-label" data-i18n="placeholderWidth">W</span>
              <input type="number" id="crop-w" class="dim-input" min="1" max="99999">
            </div>
            <span class="dim-x">×</span>
            <div class="dim-field">
              <span class="dim-label" data-i18n="placeholderHeight">H</span>
              <input type="number" id="crop-h" class="dim-input" min="1" max="99999">
            </div>
            <button id="btn-lock" class="tbtn lock-btn active" data-i18n-title="titleLockRatio" title="Lock ratio"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></button>
          </div>
          <button id="btn-apply-dims" class="btn btn-sm mt6" data-i18n="applyDimensions">Apply</button>
        </div>

        <!-- Output size -->
        <div class="ctrl-group">
          <label class="ctrl-label" data-i18n="outputSize">Output Size</label>
          <div class="dim-row">
            <div class="dim-field">
              <span class="dim-label" data-i18n="placeholderWidth">W</span>
              <input type="number" id="out-w" class="dim-input" min="1" max="99999">
            </div>
            <span class="dim-x">×</span>
            <div class="dim-field">
              <span class="dim-label" data-i18n="placeholderHeight">H</span>
              <input type="number" id="out-h" class="dim-input" min="1" max="99999">
            </div>
          </div>
        </div>

        <!-- Presets: Aspect Ratio -->
        <div class="ctrl-group">
          <label class="ctrl-label" data-i18n="presetAspectRatio">Aspect Ratio</label>
          <div class="preset-grid preset-grid-icons">
            <button class="preset-icon-btn" data-preset="free" title="Original"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 15l4-4a2 2 0 012.8 0L14 15"/><path d="M14 13l1-1a2 2 0 012.8 0L21 15"/><circle cx="8.5" cy="9.5" r="1.5"/></svg><span data-i18n="pOriginal">Original</span></button>
            <button class="preset-icon-btn" data-preset="custom" title="Custom"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-dasharray="3 2"><rect x="4" y="4" width="16" height="16" rx="1"/></svg><span data-i18n="pCustom">Custom</span></button>
            <button class="preset-icon-btn" data-preset-ratio="1x1" title="1:1"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="4" y="4" width="16" height="16" rx="1"/></svg><span>1:1</span></button>
            <button class="preset-icon-btn" data-preset-ratio="4x5" title="4:5"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="3" width="14" height="18" rx="1"/></svg><span>4:5</span></button>
            <button class="preset-icon-btn" data-preset-ratio="16x9" title="16:9"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="6" width="20" height="12" rx="1"/></svg><span>16:9</span></button>
            <button class="preset-icon-btn" data-preset-ratio="9x16" title="9:16"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="7" y="2" width="10" height="20" rx="1"/></svg><span>9:16</span></button>
            <button class="preset-icon-btn" data-preset-ratio="5x4" title="5:4"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="16" rx="1"/></svg><span>5:4</span></button>
            <button class="preset-icon-btn" data-preset-ratio="21x9" title="21:9"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="7" width="22" height="10" rx="1"/></svg><span>21:9</span></button>
            <button class="preset-icon-btn" data-preset-ratio="2x3" title="2:3"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="6" y="2" width="12" height="20" rx="1"/></svg><span>2:3</span></button>
            <button class="preset-icon-btn" data-preset-ratio="3x2" title="3:2"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="5" width="20" height="14" rx="1"/></svg><span>3:2</span></button>
          </div>
        </div>

        <!-- Presets: Common Sizes -->
        <div class="ctrl-group">
          <label class="ctrl-label" data-i18n="presetCommon">Common Sizes</label>
          <div class="preset-grid">
            <button class="btn btn-sm" data-preset="3840x2160">4K</button>
            <button class="btn btn-sm" data-preset="2560x1440">2K</button>
            <button class="btn btn-sm" data-preset="1920x1080">FHD</button>
            <button class="btn btn-sm" data-preset="1280x720">HD</button>
            <button class="btn btn-sm" data-preset="800x600">800×600</button>
            <button class="btn btn-sm" data-preset="512x512">512²</button>
          </div>
        </div>

        <!-- Presets: Social Media -->
        <div class="ctrl-group">
          <label class="ctrl-label" data-i18n="presetSocial">Social Media</label>
          <div class="preset-grid preset-grid-icons">
            <button class="preset-icon-btn" data-preset="1080x1080" title="Instagram Post"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2c2.717 0 3.056.01 4.122.06 1.065.05 1.79.217 2.428.465.66.254 1.216.598 1.772 1.153.509.5.902 1.105 1.153 1.772.247.637.415 1.363.465 2.428.047 1.066.06 1.405.06 4.122s-.01 3.056-.06 4.122c-.05 1.065-.218 1.79-.465 2.428a4.883 4.883 0 01-1.153 1.772c-.5.508-1.105.902-1.772 1.153-.637.247-1.363.415-2.428.465-1.066.047-1.405.06-4.122.06s-3.056-.01-4.122-.06c-1.065-.05-1.79-.218-2.428-.465a4.89 4.89 0 01-1.772-1.153A4.904 4.904 0 012.525 18.55c-.247-.637-.415-1.363-.465-2.428C2.013 15.056 2 14.717 2 12s.01-3.056.06-4.122c.05-1.066.217-1.79.465-2.428a4.88 4.88 0 011.153-1.772A4.897 4.897 0 015.45 2.525c.638-.248 1.362-.415 2.428-.465C8.944 2.013 9.283 2 12 2zm0 5a5 5 0 100 10 5 5 0 000-10zm0 2a3 3 0 110 6 3 3 0 010-6zm5.25-3.5a1.25 1.25 0 10 0 2.5 1.25 1.25 0 000-2.5z"/></svg><span data-i18n="pPost">Post</span></button>
            <button class="preset-icon-btn" data-preset="1080x1350" title="Instagram Story / Reel"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2c2.717 0 3.056.01 4.122.06 1.065.05 1.79.217 2.428.465.66.254 1.216.598 1.772 1.153.509.5.902 1.105 1.153 1.772.247.637.415 1.363.465 2.428.047 1.066.06 1.405.06 4.122s-.01 3.056-.06 4.122c-.05 1.065-.218 1.79-.465 2.428a4.883 4.883 0 01-1.153 1.772c-.5.508-1.105.902-1.772 1.153-.637.247-1.363.415-2.428.465-1.066.047-1.405.06-4.122.06s-3.056-.01-4.122-.06c-1.065-.05-1.79-.218-2.428-.465a4.89 4.89 0 01-1.772-1.153A4.904 4.904 0 012.525 18.55c-.247-.637-.415-1.363-.465-2.428C2.013 15.056 2 14.717 2 12s.01-3.056.06-4.122c.05-1.066.217-1.79.465-2.428a4.88 4.88 0 011.153-1.772A4.897 4.897 0 015.45 2.525c.638-.248 1.362-.415 2.428-.465C8.944 2.013 9.283 2 12 2zm0 5a5 5 0 100 10 5 5 0 000-10zm0 2a3 3 0 110 6 3 3 0 010-6zm5.25-3.5a1.25 1.25 0 10 0 2.5 1.25 1.25 0 000-2.5z"/></svg><span data-i18n="pStory">Story</span></button>
            <button class="preset-icon-btn" data-preset="820x312" title="Facebook Cover"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg><span data-i18n="pCover">Cover</span></button>
            <button class="preset-icon-btn" data-preset="1280x720" title="YouTube Thumbnail"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 00-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 00.502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 002.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 002.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg><span data-i18n="pThumb">Thumb</span></button>
            <button class="preset-icon-btn" data-preset="1500x500" title="X / Twitter Header"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg><span data-i18n="pHeader">Header</span></button>
            <button class="preset-icon-btn" data-preset="1584x396" title="LinkedIn Banner"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg><span data-i18n="pBanner">Banner</span></button>
            <button class="preset-icon-btn" data-preset="1000x1500" title="Pinterest Pin"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12.017 0C5.396 0 .029 5.367.029 11.987c0 5.079 3.158 9.417 7.618 11.162-.105-.949-.199-2.403.041-3.439.219-.937 1.406-5.957 1.406-5.957s-.359-.72-.359-1.781c0-1.668.967-2.914 2.171-2.914 1.023 0 1.518.769 1.518 1.69 0 1.029-.655 2.568-.994 3.995-.283 1.194.599 2.169 1.777 2.169 2.133 0 3.772-2.249 3.772-5.495 0-2.873-2.064-4.882-5.012-4.882-3.414 0-5.418 2.561-5.418 5.207 0 1.031.397 2.138.893 2.738a.36.36 0 01.083.345l-.333 1.36c-.053.22-.174.267-.402.161-1.499-.698-2.436-2.889-2.436-4.649 0-3.785 2.75-7.262 7.929-7.262 4.163 0 7.398 2.967 7.398 6.931 0 4.136-2.607 7.464-6.227 7.464-1.216 0-2.359-.631-2.75-1.378l-.748 2.853c-.271 1.043-1.002 2.35-1.492 3.146C9.57 23.812 10.763 24 12.017 24c6.624 0 11.99-5.367 11.99-11.988C24.007 5.367 18.641 0 12.017 0z"/></svg><span data-i18n="pPin">Pin</span></button>
          </div>
        </div>

        <!-- Presets: TMDB -->
        <div class="ctrl-group">
          <label class="ctrl-label">TMDB</label>
          <div class="preset-grid">
            <button class="btn btn-sm" data-preset="2000x3000" data-i18n="pPoster" title="Poster (2:3)">Poster</button>
            <button class="btn btn-sm" data-preset="3840x2160" data-i18n="pBackdrop" title="Backdrop (16:9)">Backdrop</button>
            <button class="btn btn-sm" data-preset="1280x720" data-i18n="pStill" title="Still / Episode (16:9)">Still</button>
            <button class="btn btn-sm" data-preset="300x450" data-i18n="pProfile" title="Profile (2:3)">Profile</button>
          </div>
        </div>

        <!-- Presets: TheTVDB -->
        <div class="ctrl-group">
          <label class="ctrl-label">TheTVDB</label>
          <div class="preset-grid">
            <button class="btn btn-sm" data-preset="680x1000" data-i18n="pPoster" title="680×1000">Poster</button>
            <button class="btn btn-sm" data-preset="1920x1080" data-i18n="pBg" title="1920×1080">BG</button>
            <button class="btn btn-sm" data-preset="758x140" data-i18n="pBanner" title="758×140">Banner</button>
            <button class="btn btn-sm" data-preset="640x360" data-i18n="pEpHd" title="640×360 HD">Ep HD</button>
            <button class="btn btn-sm" data-preset="640x480" data-i18n="pEpSd" title="640×480 SD">Ep SD</button>
            <button class="btn btn-sm" data-preset="300x450" data-i18n="pActor" title="300×450">Actor</button>
            <button class="btn btn-sm" data-preset="1000x562" title="1000×562">ClearArt</button>
            <button class="btn btn-sm" data-preset="800x310" title="800×310">ClearLogo</button>
            <button class="btn btn-sm" data-preset="1024x1024" data-i18n="pIcon" title="1024×1024">Icon</button>
            <button class="btn btn-sm" data-preset="1280x720" data-i18n="pCinema" title="1280×720">Cinemagraph</button>
          </div>
        </div>

        <!-- Format -->
        <div class="ctrl-group">
          <label class="ctrl-label" data-i18n="formatLabel">Format</label>
          <select id="resize-format" class="sel">
            <option value="png">PNG</option>
            <option value="jpeg">JPG</option>
            <option value="webp" selected>WebP</option>
            <option value="avif">AVIF</option>
          </select>
        </div>

        <!-- Actions -->
        <div class="ctrl-actions">
          <button id="btn-save" class="btn btn-accent" data-i18n="saveImage">Save Image</button>
          <button id="btn-reset" class="btn" data-i18n="resetCrop">Reset</button>
        </div>
      </div>
    </div>
  </div>
  <script src="lib/cropper.min.js"></script>
  <script src="resize.js"></script>
</body>
</html>
